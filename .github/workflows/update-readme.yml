name: Update README with latest episodes

on:
  schedule:
    - cron: '0 0 * * *' # Cada día a las 00:00 UTC
  workflow_dispatch: # Permite ejecución manual
  push:
    branches:
      - main
    paths:
      - 'src/content/episodios/**'
      - 'scripts/update-readme-episodes.mjs'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Update README
        run: node scripts/update-readme-episodes.mjs
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update latest episodes in README" && git push)
